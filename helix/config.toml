theme = "dracula-local"

[editor]
true-color=true
mouse=false
line-number="absolute"
auto-pairs=false
bufferline="multiple"
lsp.display-inlay-hints=false
end-of-line-diagnostics = "hint"

[editor.cursor-shape]
insert="bar"
normal="block"
select="underline"

[editor.inline-diagnostics]
cursor-line="warning"
